{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5 col-lg-4">
        <!-- Entrance Animation: ZoomIn for a professional landing feel -->
        <div class="card shadow-lg border-0 animate__animated animate__zoomIn animate__faster" style="border-radius: 20px; overflow: hidden;">
            <div class="card-header bg-primary text-white text-center py-4 border-0">
                <i class="bi bi-person-circle fs-1 mb-2 animate__animated animate__bounceIn animate__delay-1s"></i>
                <h4 class="mb-0 fw-bold">Student Portal</h4>
                <p class="small opacity-75 mb-0">CATC Online Form Request</p>
            </div>
            <div class="card-body p-4 bg-white">
                <p class="text-muted text-center small mb-4">Enter your Student ID to receive a login OTP via email or SMS.</p>
                
                <form method="post" id="loginForm">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label class="form-label fw-bold small text-muted text-uppercase" style="letter-spacing: 1px;">Student ID</label>
                        <div class="input-group input-group-lg border-2">
                            <span class="input-group-text bg-light border-end-0 text-primary"><i class="bi bi-card-text"></i></span>
                            {{ form.student_id }}
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 py-3 fw-bold shadow-sm main-btn" id="sendBtn">
                        <span id="btnText">SEND OTP</span>
                        <span id="btnSpinner" class="spinner-border spinner-border-sm d-none"></span>
                    </button>
                </form>

                <!-- Removed Staff Login Area footer link from here -->
            </div>
        </div>
    </div>
</div>

<style>
    /* Vibrant Input Styling */
    input[name="student_id"] {
        border-left: none !important;
        font-weight: 700;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: #0d6efd;
        transition: all 0.3s ease;
    }

    input[name="student_id"]:focus {
        background-color: #f0f7ff;
        box-shadow: none;
    }
    
    .main-btn {
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        border-radius: 12px;
        background: linear-gradient(135deg, #0d6efd, #0056b3);
        border: none;
    }

    .main-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 20px rgba(13, 110, 253, 0.35) !important;
    }

    .main-btn:active {
        transform: translateY(0);
    }
</style>

<script>
    // Visual feedback when the student submits the form
    document.getElementById('loginForm').addEventListener('submit', function() {
        const btn = document.getElementById('sendBtn');
        document.getElementById('btnText').innerText = "Requesting Code...";
        document.getElementById('btnSpinner').classList.remove('d-none');
        btn.classList.add('disabled');
        btn.classList.add('animate__animated', 'animate__pulse', 'animate__infinite');
    });
</script>
{% endblock %}

{% block footer %}{% endblock %}
